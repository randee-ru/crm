# CRM Kit production compose for crm.sportmax.fit
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm_kit}
      POSTGRES_USER: ${POSTGRES_USER:-crm_kit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    mem_limit: 128m

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MESSENGER_GATEWAY_URL: http://messenger-gateway:8787
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      messenger-gateway:
        condition: service_started
    mem_limit: 700m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  telephony-sync:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MESSENGER_GATEWAY_URL: http://messenger-gateway:8787
    command:
      [
        "python",
        "manage.py",
        "run_telephony_sync_worker",
        "--interval-seconds",
        "${TELEPHONY_BACKGROUND_SYNC_INTERVAL_SECONDS:-600}",
        "--lookback-days",
        "${TELEPHONY_SYNC_LOOKBACK_DAYS:-2}",
        "--archive-limit",
        "${TELEPHONY_RECORDING_ARCHIVE_LIMIT:-25}",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 300m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://crm.sportmax.fit}
        NEXT_PUBLIC_COMPANY_SLUG: ${NEXT_PUBLIC_COMPANY_SLUG:-sportmax}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://crm.sportmax.fit}
        NEXT_PUBLIC_SCHEDULE_HOST: ${NEXT_PUBLIC_SCHEDULE_HOST:-schedule.sportmax.fit}
        NEXT_PUBLIC_SCHEDULE_URL: ${NEXT_PUBLIC_SCHEDULE_URL:-https://schedule.sportmax.fit}
        NEXT_PUBLIC_CLIENT_LK_HOST: ${NEXT_PUBLIC_CLIENT_LK_HOST:-lk.sportmax.fit}
        NEXT_PUBLIC_CLIENT_LK_URL: ${NEXT_PUBLIC_CLIENT_LK_URL:-https://lk.sportmax.fit}
        NEXT_PUBLIC_CRM_HOST: ${NEXT_PUBLIC_CRM_HOST:-crm.sportmax.fit}
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8000
      BACKEND_API_BASE_URL: http://backend:8000
      BACKEND_REWRITE_ORIGIN: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://crm.sportmax.fit}
      NEXT_PUBLIC_COMPANY_SLUG: ${NEXT_PUBLIC_COMPANY_SLUG:-sportmax}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://crm.sportmax.fit}
      NEXT_PUBLIC_SCHEDULE_HOST: ${NEXT_PUBLIC_SCHEDULE_HOST:-schedule.sportmax.fit}
      NEXT_PUBLIC_SCHEDULE_URL: ${NEXT_PUBLIC_SCHEDULE_URL:-https://schedule.sportmax.fit}
      NEXT_PUBLIC_CLIENT_LK_HOST: ${NEXT_PUBLIC_CLIENT_LK_HOST:-lk.sportmax.fit}
      NEXT_PUBLIC_CLIENT_LK_URL: ${NEXT_PUBLIC_CLIENT_LK_URL:-https://lk.sportmax.fit}
      NEXT_PUBLIC_CRM_HOST: ${NEXT_PUBLIC_CRM_HOST:-crm.sportmax.fit}
    depends_on:
      - backend
    mem_limit: 512m

  messenger-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MESSENGER_GATEWAY_PORT: 8787
      MESSENGER_GATEWAY_SECRET: ${MESSENGER_GATEWAY_SECRET:?set MESSENGER_GATEWAY_SECRET}
      CRM_GATEWAY_WEBHOOK_URL: http://backend:8000/api/v1/channels/gateway/inbound/
      MESSENGER_GATEWAY_SESSIONS_DIR: /app/data/sessions
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
    volumes:
      - messenger_gateway_data:/app/data
    mem_limit: 350m

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/00-security.conf:/etc/nginx/conf.d/00-security.conf:ro
      - ./deploy/nginx/scanner-blocked-ips.conf:/etc/nginx/scanner-blocked-ips.conf:ro
      - ./deploy/nginx/scanner-blocked-uris.map:/etc/nginx/scanner-blocked-uris.map:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
    depends_on:
      - frontend
      - backend
    mem_limit: 128m

volumes:
  postgres_data:
  messenger_gateway_data:
  media_data:
  static_data:
