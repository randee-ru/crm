# Shared security maps (http context via conf.d).
# Blocklisted IPs and URI probes close the connection (444) before upstreams.

geo $scanner_ip_blocked {
    default 0;
    include /etc/nginx/scanner-blocked-ips.conf;
}

map $request_uri $scanner_uri_blocked {
    default 0;
    include /etc/nginx/scanner-blocked-uris.map;
}
