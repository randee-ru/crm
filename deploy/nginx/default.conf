resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream crm_frontend {
    zone crm_frontend 64k;
    server frontend:3000 resolve;
}

upstream crm_backend {
    zone crm_backend 64k;
    server backend:8000 resolve;
}

# ---- HTTP: ACME + redirect ----
server {
    listen 80;
    server_name crm.sportmax.fit schedule.sportmax.fit lk.sportmax.fit sport-max.com.ru www.sport-max.com.ru;

    if ($scanner_ip_blocked) { return 444; }
    if ($scanner_uri_blocked) { return 444; }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Drop unknown Host headers on port 80 (IP probes / random domains).
server {
    listen 80 default_server;
    server_name _;

    if ($scanner_ip_blocked) { return 444; }
    return 444;
}

# ---- CRM for staff ----
server {
    listen 443 ssl;
    http2 on;
    server_name crm.sportmax.fit;

    ssl_certificate /etc/letsencrypt/live/crm.sportmax.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.sportmax.fit/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    if ($scanner_ip_blocked) { return 444; }
    if ($scanner_uri_blocked) { return 444; }

    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 7d;
    }

    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 1d;
    }

    location /health/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /admin/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/v1/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /backend/ {
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Старые публичные ссылки расписания → schedule.*
    location ~ ^/(schedule|embed/schedule)/ {
        return 301 https://schedule.sportmax.fit/;
    }

    location / {
        proxy_pass http://crm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }
}

# ---- Public schedule ----
server {
    listen 443 ssl;
    http2 on;
    server_name schedule.sportmax.fit;

    ssl_certificate /etc/letsencrypt/live/crm.sportmax.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.sportmax.fit/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    if ($scanner_ip_blocked) { return 444; }
    if ($scanner_uri_blocked) { return 444; }

    # API публичного расписания — сразу в Django (Host=schedule → без token).
    location /api/v1/public/schedule/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /api/public/schedule/ {
        rewrite ^/api/public/schedule/(.*)$ /api/v1/public/schedule/$1 break;
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location / {
        proxy_pass http://crm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }
}

# ---- Legacy brand domain → public schedule ----
server {
    listen 443 ssl;
    http2 on;
    server_name sport-max.com.ru www.sport-max.com.ru;

    ssl_certificate /etc/letsencrypt/live/crm.sportmax.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.sportmax.fit/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    if ($scanner_ip_blocked) { return 444; }
    if ($scanner_uri_blocked) { return 444; }

    location / {
        return 301 https://schedule.sportmax.fit/;
    }
}

# ---- Client LK (личный кабинет) ----
server {
    listen 443 ssl;
    http2 on;
    server_name lk.sportmax.fit;

    ssl_certificate /etc/letsencrypt/live/crm.sportmax.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.sportmax.fit/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    if ($scanner_ip_blocked) { return 444; }
    if ($scanner_uri_blocked) { return 444; }

    # Пока ЛК ведёт на расписание (вход клиентов там же).
    location / {
        return 302 https://schedule.sportmax.fit/;
    }
}

# Drop unknown Host headers on HTTPS (no cert needed if client uses IP/SNI mismatch → openssl may fail before here).
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/crm.sportmax.fit/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.sportmax.fit/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 444;
}
