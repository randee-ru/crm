services:
  postgres:
    image: postgres:17
    container_name: crm-kit-postgres
    environment:
      POSTGRES_DB: crm_kit
      POSTGRES_USER: crm_kit
      POSTGRES_PASSWORD: crm_kit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_kit -d crm_kit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-kit-redis
    ports:
      - "6379:6379"

  backend:
    profiles: ["docker-backend"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-kit-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
