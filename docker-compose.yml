services:
  postgres:
    image: postgres:17
    container_name: crm-kit-postgres
    environment:
      POSTGRES_DB: crm_kit
      POSTGRES_USER: crm_kit
      POSTGRES_PASSWORD: crm_kit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_kit -d crm_kit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crm-kit-redis
    ports:
      - "6379:6379"

  messenger-gateway:
    image: node:22-alpine
    container_name: crm-kit-messenger-gateway
    working_dir: /app
    command: sh -c "npm install && npm start"
    volumes:
      - ./gateway:/app
      - messenger_gateway_data:/app/data
    env_file:
      - gateway/.env.example
    environment:
      CRM_GATEWAY_WEBHOOK_URL: http://backend:8000/api/v1/channels/gateway/inbound/
    ports:
      - "8787:8787"

  backend:
    profiles: ["docker-backend"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-kit-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MESSENGER_GATEWAY_URL: http://messenger-gateway:8787
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  telephony-sync:
    profiles: ["docker-backend"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-kit-telephony-sync
    command: python manage.py run_telephony_sync_worker --interval-seconds 120 --lookback-days 2 --archive-limit 10
    volumes:
      - .:/app
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      MESSENGER_GATEWAY_URL: http://messenger-gateway:8787
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  messenger_gateway_data:
