services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: crm_kit
      POSTGRES_USER: crm_kit
      POSTGRES_PASSWORD: crm_kit
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_kit -d crm_kit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

